# Promote the tested :test image to production on tag push (GitHub flow release).
#
# GitHub flow: a release is tagging a commit on `main` with `vX.Y.Z`. That tag
# fires this workflow. We do NOT promote by rebuilding from the tagged commit ‚Äî
# we promote the image currently running on test (the `:test` tag, which
# `deploy.yml` published from `main`). "Ship exactly what test validated": a
# rebuild could pull a newer base layer and ship bytes the test gateway never tested.
#
# The image-based payoff: we do NOT rebuild. The `:test` image is RE-TAGGED to
# :vX.Y.Z + :production with a server-side manifest copy (`docker buildx imagetools
# create`) ‚Äî same bytes, same digest test ran. Then production is recreated from it.
#
# One job, on a free GitHub-hosted runner:
#   promote (ubuntu-latest)  re-tag :test ‚Üí :vX.Y.Z + :production  (no rebuild)
#
# There is deliberately NO deploy job. Pointing the production gateway at the promoted
# tag is done by hand (IGNITION_PRODUCTION_IMAGE + `docker compose up -d
# ignition-production`) ‚Äî this lab runs no self-hosted runner.
#
# Triggers on tags matching `v*` (e.g. v1.0.0). Also supports manual dispatch
# with a version input ‚Äî that's the rollback button: re-promote any ALREADY
# RELEASED version's image (:vX.Y.Z) back to production without touching git.
#
# Add required reviewers on a GitHub environment if you want a manual approval
# gate before production releases ‚Äî common pattern, no workflow change needed.

name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Already-released version to re-promote to production (e.g. v1.0.0)'
        required: true
        type: string

concurrency:
  group: promote-production-image
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  # No validation job here: you tag a commit that is already on main, and it
  # passed ci.yml on the PR that merged it (and deploy.yml built its image).
  # The tag chooses which validated, already-built image is promoted; only
  # tag commits that came through a PR.
  promote:
    name: Promote tested image to production tag
    runs-on: ubuntu-latest
    steps:
      # No checkout needed ‚Äî the promote job only re-tags images in the registry.

      - name: Compute source + target tags
        id: meta
        run: |
          set -euo pipefail
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          base="${REGISTRY}/${owner}/cicd-lab-05-ignition"
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            # Manual dispatch = rollback / re-promote: the source is an image that
            # was ALREADY released under :vX.Y.Z. We re-point :production at it.
            version="${{ github.event.inputs.tag }}"
            source="${base}:${version}"
          else
            # Tag push = new release: promote whatever the test gateway is running right now.
            version="${{ github.ref_name }}"
            source="${base}:test"
          fi
          {
            echo "base=${base}"
            echo "source=${source}"
            echo "version=${version}"
            echo "image=${base}:${version}"
          } >> "$GITHUB_OUTPUT"
          echo "Promote ${source}  ‚Üí  ${base}:${version} + ${base}:production"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Re-tag the tested image (no rebuild)
        # imagetools copies the manifest server-side: the production tags point at the
        # exact same digest the test gateway tested. If this fails with "not found":
        #   - new release ‚Üí there is no :test image yet; push to `main` so
        #     deploy.yml builds and ships one first.
        #   - rollback ‚Üí that version was never released (no :vX.Y.Z image).
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            --tag "${{ steps.meta.outputs.image }}" \
            --tag "${{ steps.meta.outputs.base }}:production" \
            "${{ steps.meta.outputs.source }}"

      - name: Tell me how to deploy this release
        # No deploy job in this lab ‚Äî promoting a release is a registry
        # operation, and pointing production at the promoted tag is done by hand.
        run: |
          {
            echo "### Released ${{ steps.meta.outputs.version }}"
            echo
            echo "Same digest the test gateway tested, now tagged:"
            echo
            echo '```'
            echo "${{ steps.meta.outputs.image }}"
            echo "${{ steps.meta.outputs.base }}:production"
            echo '```'
            echo
            echo "Deploy it to your production gateway by hand:"
            echo
            echo '```bash'
            echo "docker pull ${{ steps.meta.outputs.image }}"
            echo "IGNITION_PRODUCTION_IMAGE=${{ steps.meta.outputs.image }} \\"
            echo "  docker compose up -d ignition-production"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
