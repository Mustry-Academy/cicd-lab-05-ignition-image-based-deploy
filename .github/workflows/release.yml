# Promote the tested DEV image to prod on tag push (GitHub flow release).
#
# GitHub flow: a release is tagging a commit on `main` with `vX.Y.Z`. That tag
# fires this workflow. We do NOT promote by rebuilding from the tagged commit —
# we promote the image currently running on dev (the `:dev` tag, which
# `deploy.yml` published from `main`). "Ship exactly what dev validated": a
# rebuild could pull a newer base layer and ship bytes dev never tested.
#
# The image-based payoff: we do NOT rebuild. The `:dev` image is RE-TAGGED to
# :vX.Y.Z + :prod with a server-side manifest copy (`docker buildx imagetools
# create`) — same bytes, same digest dev ran. Then prod is recreated from it.
#
# Two jobs:
#   promote (ubuntu-latest)  re-tag :dev → :vX.Y.Z + :prod  (no rebuild)
#   deploy  (self-hosted)    pull :vX.Y.Z and recreate the prod gateway container
#
# Triggers on tags matching `v*` (e.g. v1.0.0). Also supports manual dispatch
# with a version input — that's the rollback button: re-promote any ALREADY
# RELEASED version's image (:vX.Y.Z) back to prod without touching git.
#
# Add required reviewers on the lab-gateway-prod environment if you want a manual
# approval gate before prod releases — common pattern, no workflow change needed.

name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Already-released version to re-promote to prod (e.g. v1.0.0)'
        required: true
        type: string

concurrency:
  group: release-lab-gateway-prod
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  promote:
    name: Promote tested image to prod tag
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      # No checkout needed — the promote job only re-tags images in the registry.

      - name: Compute source + target tags
        id: meta
        run: |
          set -euo pipefail
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          base="${REGISTRY}/${owner}/cicd-lab-05-ignition"
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            # Manual dispatch = rollback / re-promote: the source is an image that
            # was ALREADY released under :vX.Y.Z. We re-point :prod at it.
            version="${{ github.event.inputs.tag }}"
            source="${base}:${version}"
          else
            # Tag push = new release: promote whatever dev is running right now.
            version="${{ github.ref_name }}"
            source="${base}:dev"
          fi
          {
            echo "base=${base}"
            echo "source=${source}"
            echo "version=${version}"
            echo "image=${base}:${version}"
          } >> "$GITHUB_OUTPUT"
          echo "Promote ${source}  →  ${base}:${version} + ${base}:prod"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Re-tag the tested image (no rebuild)
        # imagetools copies the manifest server-side: the prod tags point at the
        # exact same digest dev tested. If this fails with "not found":
        #   - new release → there is no :dev image yet; push to `main` so
        #     deploy.yml builds and ships one first.
        #   - rollback → that version was never released (no :vX.Y.Z image).
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            --tag "${{ steps.meta.outputs.image }}" \
            --tag "${{ steps.meta.outputs.base }}:prod" \
            "${{ steps.meta.outputs.source }}"

  deploy:
    name: Deploy to prod gateway
    needs: promote
    runs-on: [self-hosted, lab05]
    environment: lab-gateway-prod
    env:
      IGNITION_PROD_IMAGE: ${{ needs.promote.outputs.image }}
      IGNITION_URL: ${{ vars.IGNITION_URL || 'http://ignition-prod:8088' }}

    steps:
      - uses: actions/checkout@v4

      - name: Verify deploy prerequisites
        run: |
          set -euo pipefail
          command -v docker >/dev/null || { echo "docker CLI not on runner"; exit 1; }
          docker compose version >/dev/null || { echo "docker compose v2 not on runner"; exit 1; }
          test -n "$IGNITION_PROD_IMAGE" || { echo "promote job did not produce an image ref"; exit 1; }
          echo "Will deploy image: $IGNITION_PROD_IMAGE"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull the promoted image
        run: docker pull "$IGNITION_PROD_IMAGE"

      - name: Recreate the prod gateway from the promoted image
        run: docker compose up -d ignition-prod

      - name: Smoke-check gateway health
        run: |
          set -euo pipefail
          for i in $(seq 1 90); do
            if curl -fsS --max-time 3 "$IGNITION_URL/StatusPing" 2>/dev/null | grep -q RUNNING; then
              echo "prod gateway RUNNING after ~$((i * 2))s, serving $IGNITION_PROD_IMAGE"
              exit 0
            fi
            sleep 2
          done
          echo "prod gateway did not reach RUNNING after release" >&2
          docker logs --tail 100 lab05-ignition-prod >&2 || true
          exit 1
