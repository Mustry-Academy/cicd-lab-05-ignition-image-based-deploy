# Build a gateway image and deploy it to the dev gateway on push to main.
#
# GitHub flow: `main` is the only long-lived branch. Feature branches merge into
# it via PR, and every push here builds an image and ships it to the DEV
# gateway. Releases to prod happen separately (tag vX.Y.Z → release.yml).
#
# This workflow BUILDS ONLY. It runs entirely on a free GitHub-hosted runner:
#
#   build  (ubuntu-latest, GitHub-hosted, FREE)
#     → docker build bakes projects/config/modules into a MULTI-ARCH image
#       (linux/amd64 + linux/arm64) so it runs natively on Intel and Apple Silicon
#     → push it to GHCR tagged :sha-<short> (immutable) and :dev (moving)
#     → print the image ref in the run summary
#
# There is deliberately NO deploy job. Deploying means pointing a gateway at a
# new image name, and in this lab you do that by hand: copy the printed tag into
# IGNITION_DEV_IMAGE and run `docker compose up -d ignition-dev` yourself. That
# keeps the lab free of self-hosted runners — the build half of the pattern is
# portable, and automating the last mile is what Lab 06/07 build on top.
#
# GHCR auth uses the built-in GITHUB_TOKEN (`packages: write`). No PAT, no
# secret to manage for the registry.

name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "projects/**"
      - "services/**"
      - "third-party-modules/**"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: build-dev-image
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build and push image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute image name + tags
        id: meta
        # GHCR requires a lowercase path. Derive it from the owner, append a
        # stable repo suffix, and tag with the short SHA (immutable) + dev.
        run: |
          set -euo pipefail
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          base="${REGISTRY}/${owner}/cicd-lab-05-ignition"
          short="$(git rev-parse --short HEAD)"
          {
            echo "base=${base}"
            echo "short=${short}"
            echo "image=${base}:sha-${short}"
          } >> "$GITHUB_OUTPUT"
          echo "Image: ${base}:sha-${short} (+ :dev)"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # QEMU lets this amd64 runner also emit the arm64 variant. Our Dockerfile
      # is COPY-only (no RUN/compile), so there's nothing to emulate — building
      # both platforms is cheap.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Multi-arch so the image runs natively whether the deploy target is
          # amd64 (Intel/Linux) or arm64 (Apple Silicon). Without this, an
          # arm64 runner pulling an amd64-only image fails with
          # "no matching manifest for linux/arm64/v8".
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.meta.outputs.base }}:sha-${{ steps.meta.outputs.short }}
            ${{ steps.meta.outputs.base }}:dev
          build-args: |
            GIT_SHA=${{ steps.meta.outputs.short }}
            IMAGE_SOURCE=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Tell me how to deploy this image
        # There is no deploy job in this lab: the last mile is manual, by hand,
        # on your own machine. Print the exact image ref so it can be pasted
        # straight into .env. Automating this step is what Lab 06/07 add.
        run: |
          {
            echo "### Image built and pushed"
            echo
            echo '```'
            echo "${{ steps.meta.outputs.base }}:sha-${{ steps.meta.outputs.short }}"
            echo '```'
            echo
            echo "Deploy it to your dev gateway by hand:"
            echo
            echo '```bash'
            echo "docker pull ${{ steps.meta.outputs.base }}:sha-${{ steps.meta.outputs.short }}"
            echo "IGNITION_DEV_IMAGE=${{ steps.meta.outputs.base }}:sha-${{ steps.meta.outputs.short }} \\"
            echo "  docker compose up -d ignition-dev"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
